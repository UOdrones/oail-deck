<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Silver oil droplet with blue tech circuit glow -->
  <defs>
    <linearGradient id="dropGrad" x1="12" y1="4" x2="36" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e4e8ec"/>
      <stop offset="40%" stop-color="#c8cdd3"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="28" y1="12" x2="46" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Oil droplet shape -->
  <path d="M24 4 C24 4 10 20 10 30 C10 38 16.27 44 24 44 C31.73 44 38 38 38 30 C38 20 24 4 24 4Z" fill="url(#dropGrad)" stroke="#94a3b8" stroke-width="0.5"/>
  <!-- Circuit traces emanating from droplet -->
  <g filter="url(#glow)">
    <line x1="30" y1="18" x2="42" y2="14" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="32" y1="22" x2="44" y2="20" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="33" y1="26" x2="46" y2="26" stroke="url(#circuitGrad)" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="32" y1="30" x2="43" y2="32" stroke="url(#circuitGrad)" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Glowing nodes -->
    <circle cx="42" cy="14" r="2" fill="#38bdf8"/>
    <circle cx="44" cy="20" r="1.5" fill="#0ea5e9"/>
    <circle cx="46" cy="26" r="2" fill="#38bdf8"/>
    <circle cx="43" cy="32" r="1.5" fill="#0ea5e9"/>
  </g>
</svg>
